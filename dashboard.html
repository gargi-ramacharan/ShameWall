<!DOCTYPE html>
<html>
<head>
    <meta charset = "UTF-8">
    <title>ShameWall Analytics</title>
    <script src="chart.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Courier New', monospace; text-align: center; padding: 40px; }
        h1 { color: #ff4d4d; text-shadow: 0 0 15px red; letter-spacing: 5px; font-size: 40px; margin-bottom: 40px; }
        
        .stats-container { display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; }
        .stat-box { background: #000; padding: 25px; border-radius: 8px; border: 2px solid #ff4d4d; min-width: 200px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); }
        .stat-label { font-size: 16px; color: #aaa; margin-bottom: 10px; }
        .stat-value { font-size: 36px; font-weight: bold; color: #ff4d4d; }
        
        .chart-wrapper { width: 80%; max-width: 900px; margin: 0 auto; background: #000; padding: 30px; border-radius: 8px; border: 1px solid #333; }
    </style>
</head>
<body>
    <h1>🚨 SHAMEWALL INTELLIGENCE 🚨</h1>
    
    <div class="stats-container">
        <div class="stat-box">
            <div class="stat-label">TOTAL INFRACTIONS</div>
            <div class="stat-value" id="total-count">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">BIGGEST WEAKNESS</div>
            <div class="stat-value" id="worst-site">None</div>
        </div>
    </div>

    <div class="chart-wrapper">
        <canvas id="shameChart"></canvas>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
